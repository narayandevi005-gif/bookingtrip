<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Admin Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,sans-serif;background:#f5f7fa}
.header{background:#0d4f8b;color:#fff;padding:25px;text-align:center}
.container{max-width:1400px;margin:auto;padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:20px}
.stat-card,.bookings-table{background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.stat-card{padding:20px;text-align:center}
.value{font-size:2rem;font-weight:bold;color:#0d4f8b}
.refresh-btn{background:#0d4f8b;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;margin:5px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #eee;text-align:left}
thead{background:#0d4f8b;color:#fff}
.expand-btn{background:#0d4f8b;color:#fff;border:none;padding:6px 10px;border-radius:5px;cursor:pointer}
.modal{display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.5)}
.modal-content{background:#fff;max-width:700px;margin:50px auto;padding:20px;border-radius:10px;max-height:80vh;overflow:auto}
.close-modal{float:right;font-size:28px;cursor:pointer}
.success,.error{padding:10px;border-radius:8px;margin:10px 0}
.success{background:#d4edda}.error{background:#f8d7da}
</style>
</head>
<body>
<div class="header">
<h1>📊 Booking Admin Dashboard</h1>
<p>Trip Booking Management</p>
</div>

<div class="container">
<div style="display:flex;gap:10px;align-items:center;margin-bottom:15px;">
<button class="refresh-btn" onclick="loadData()">🔄 Refresh Now</button>
<button class="refresh-btn" onclick="toggleAutoRefresh()" id="autoRefreshBtn" style="background:#4caf50;">✓ Auto-Refresh ON (5s)</button>
<span id="lastUpdated" style="font-size:12px;color:#666;">Last updated: --:--:--</span>
</div>
<div id="message"></div>

<div class="stats-grid">
<div class="stat-card"><h3>Total Bookings</h3><div class="value" id="totalBookings">0</div></div>
<div class="stat-card"><h3>Total Persons</h3><div class="value" id="totalChildren">0</div></div>
<div class="stat-card"><h3>Total Amount</h3><div class="value" id="totalAmount">₹0</div></div>
<div class="stat-card"><h3>Average</h3><div class="value" id="avgAmount">₹0</div></div>
</div>

<div class="bookings-table">
<table>
<thead>
<tr>
<th>ID</th><th>Name</th><th>WhatsApp</th><th>Qty</th><th>Per Person</th><th>Amount</th><th>Date</th><th>Action</th>
</tr>
</thead>
<tbody id="bookingsBody">
<tr><td colspan="8">Loading...</td></tr>
</tbody>
</table>
</div>
</div>

<div id="detailModal" class="modal">
<div class="modal-content">
<span class="close-modal" onclick="closeModal()">&times;</span>
<div id="modalBody"></div>
</div>
</div>

<script>
const DEFAULT_API_URL = 'http://localhost:10000';
function resolveApiUrl() {
    try {
        const origin = window.location.origin;
        if (!origin || origin === 'null' || location.protocol === 'file:') {
            return DEFAULT_API_URL;
        }
        return origin;
    } catch (err) {
        return DEFAULT_API_URL;
    }
}
const API_URL = resolveApiUrl();

function showMessage(msg,type){
    document.getElementById('message').innerHTML=`<div class="${type}">${msg}</div>`;
}

async function fetchWithFallback(path) {
    const primary = API_URL + path;
    try {
        const res = await fetch(primary);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res;
    } catch (primaryErr) {
        if (API_URL !== DEFAULT_API_URL) {
            const fallback = DEFAULT_API_URL + path;
            const res = await fetch(fallback);
            if (!res.ok) throw new Error(`Fallback HTTP ${res.status}`);
            return res;
        }
        throw primaryErr;
    }
}

let autoRefreshEnabled = true;
let autoRefreshInterval = null;

function toggleAutoRefresh() {
    autoRefreshEnabled = !autoRefreshEnabled;
    const btn = document.getElementById('autoRefreshBtn');
    if (autoRefreshEnabled) {
        btn.textContent = '✓ Auto-Refresh ON (5s)';
        btn.style.background = '#4caf50';
        startAutoRefresh();
    } else {
        btn.textContent = '✗ Auto-Refresh OFF';
        btn.style.background = '#f44336';
        clearInterval(autoRefreshInterval);
    }
}

function startAutoRefresh() {
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(loadData, 5000);
}

function updateLastUpdated() {
    const now = new Date();
    const time = now.toLocaleTimeString('en-IN');
    document.getElementById('lastUpdated').textContent = `Last updated: ${time}`;
}

async function loadData(){
    try{
        const statsResponse = await fetchWithFallback('/api/stats');
        const stats = await statsResponse.json();

        document.getElementById('totalBookings').textContent=stats.total_bookings||0;
        document.getElementById('totalChildren').textContent=stats.total_children||0;
        document.getElementById('totalAmount').textContent=stats.total_amount||'₹0';
        document.getElementById('avgAmount').textContent=stats.average_per_booking||'₹0';

        const bookingsResponse = await fetchWithFallback('/api/bookings');
        const data = await bookingsResponse.json();

        window._bookings=(data.bookings||[]).slice().reverse();

        let html='';
        window._bookings.forEach((booking,index)=>{
            const qty = booking.payment?.num_persons || booking.payment?.num_children || 0;
            const perPerson = booking.payment?.price_per_person || 2000;
            html+=`
<tr>
<td>${booking.confirmation_id||'N/A'}</td>
<td>${booking.guardian?.name||''}</td>
<td>${booking.guardian?.whatsapp||''}</td>
<td>${qty}</td>
<td>₹${perPerson}</td>
<td>₹${booking.payment?.amount||0}</td>
<td>${booking.timestamp?new Date(booking.timestamp).toLocaleDateString('en-IN'):'-'}</td>
<td><button class="expand-btn" onclick="viewDetails(${index})">View</button></td>
</tr>`;
        });

        document.getElementById('bookingsBody').innerHTML=html||'<tr><td colspan="8">No bookings found</td></tr>';
        updateLastUpdated();
    }
    catch(err){
        document.getElementById('bookingsBody').innerHTML='<tr><td colspan="8" style="text-align:center;color:red;padding:30px;">Failed to load bookings. Check backend at ' + API_URL + ' or ' + DEFAULT_API_URL + '.</td></tr>';
        showMessage('Failed to load admin data: ' + err.message,'error');
        console.error(err);
    }
}

function viewDetails(index){
const booking=window._bookings[index];
if(!booking)return;

const qty = booking.payment?.num_persons || booking.payment?.num_children || 0;
const perPerson = booking.payment?.price_per_person || 2000;
const screenshotHtml = booking.payment?.payment_screenshot_data ? `
    <div style="margin-top:20px;">
        <strong>Payment Screenshot:</strong>
        <img src="${booking.payment.payment_screenshot_data}" alt="Payment Screenshot" style="width:100%;max-width:100%;border-radius:10px;margin-top:10px;" />
    </div>
` : booking.payment?.payment_screenshot_name ? `
    <div style="margin-top:20px;">
        <strong>Uploaded Screenshot:</strong> ${booking.payment.payment_screenshot_name}
    </div>
` : '';

document.getElementById('modalBody').innerHTML=`
<h2>Booking Details</h2>
<p><b>ID:</b> ${booking.confirmation_id||''}</p>
<p><b>Name:</b> ${booking.guardian?.name||''}</p>
<p><b>WhatsApp:</b> ${booking.guardian?.whatsapp||''}</p>
<p><b>Email:</b> ${booking.guardian?.email||''}</p>
<p><b>Persons:</b> ${qty}</p>
<p><b>Per Person:</b> ₹${perPerson}</p>
<p><b>Amount:</b> ₹${booking.payment?.amount||0}</p>
${screenshotHtml}
`;

document.getElementById('detailModal').style.display='block';
}

function closeModal(){
document.getElementById('detailModal').style.display='none';
}

window.onload=function(){
    loadData();
    startAutoRefresh();
};
</script>
</body>
</html>
